- name: create ec2 and r53
  hosts: local
  connection: local
  vars:
    ami_id: ami-0220d79f3f480ecf5
    sg_id: sg-08570272f74f280e0
    zone_id: "Z0703152351ZHIBULK5Q0"
    domain_name: "thiscomeback.fun"

  tasks:
  - name: create ec2 instance
    amazon.aws.ec2_instance:
      name: "{{ item }}"
      instance_type: t3.micro
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      tags:
       Name: "{{ item }}"
      loop: "{{ instances }}"
      register: ec2_output

  
  - name: create route53 recordd
    amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record: "{{ item.item }}.{{ domain_name }}" # mongodb.daws86s.fun
        type: A
        ttl: 2
        value: "{{ item.instances[0].private_ip_address }}"
        overwrite: true
    loop: "{{ ec2_output.results }}"


   # we are creating one record with public only for frontend
  - name: create route53 record for frontend
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{ domain_name }}" # daws86s.fun
      type: A
      ttl: 1
      value: "{{ item.instances[0].public_ip_address }}"
      overwrite: true
    when: item.item == "frontend"
    loop: "{{ ec2_output.results }}"